    <style>
        /* CSS RESET & ESTILOS BÁSICOS */
        :root {
            --primary-gold: #D4AF37;
            --dark-black: #1a1a1a;
            --clean-white: #ffffff;
            --barber-blue: #0A2F44; /* Azul profundo para barbería */
            --whatsapp-green: #25D366;
            --accent-gray: #f4f4f4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* Contenedor Principal Responsive */
        .card {
            width: 100%;
            max-width: 420px;
            background: var(--clean-white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* SECCIÓN 1: IMAGEN INTEGRADA (Sustituye la URL por la tuya una vez subida a GitHub) */
        .hero-image {
            width: 100%;
            height: 350px;
            /* IMPORTANTE: Cuando subas la imagen a GitHub, cambia esta URL por la URL cruda de tu imagen */
            background-image: url('image_1.png'); 
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .hero-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 25px;
            background: linear-gradient(to top, rgba(0,0,0,1) 30%, transparent);
            color: white;
            text-align: center;
        }
        .hero-overlay p {
            font-size: 0.9rem;
            color: var(--primary-gold);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .hero-overlay h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin: 0;
        }
